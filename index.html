<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FixMyRide | Smart Vehicle Repair & Maintenance</title>
    <meta name="description" content="Connect with nearby mechanics, book services, and get emergency breakdown support instantly.">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Styles -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="app">
        <!-- Navigation -->
        <nav class="navbar">
            <div class="nav-container">
                <a href="#" class="logo" id="nav-logo">
                    <span class="logo-icon"><i data-lucide="wrench"></i></span>
                    <span class="logo-text">FixMyRide</span>
                </a>
                <div class="nav-actions" id="nav-actions">
                    <!-- Dynamic nav items based on auth state -->
                </div>
                <div class="lang-toggle">
                    <select id="lang-select" class="form-input" style="padding: 0.25rem 0.5rem; font-size: 0.75rem; width: auto;">
                        <option value="en">EN</option>
                        <option value="hi">HI</option>
                    </select>
                </div>
            </div>
        </nav>

        <!-- Main Content Area -->
        <main id="main-content">
            <div class="loader-container">
                <div class="loader"></div>
            </div>
        </main>

        <!-- SOS Button (Global) -->
        <button id="sos-button" class="sos-btn hidden">
            <i data-lucide="alert-circle"></i>
            <span>SOS</span>
        </button>

        <!-- Chat Button -->
        <button id="chat-toggle" class="chat-toggle-btn hidden">
            <i data-lucide="message-circle"></i>
        </button>

        <!-- Chat Window -->
        <div id="chat-window" class="chat-window hidden">
            <div class="chat-header">
                <h3>Chat with Mechanic</h3>
                <button id="chat-close"><i data-lucide="x"></i></button>
            </div>
            <div id="chat-messages" class="chat-messages">
                <div class="msg bot">Hello! How can I help you with your vehicle today?</div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="chat-input" placeholder="Type a message...">
                <button id="chat-send"><i data-lucide="send"></i></button>
            </div>
        </div>

        <!-- Notifications -->
        <div id="notification-container"></div>
    </div>

    <!-- Firebase SDKs (CDN) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    
    <!-- App Logic -->
    <script src="js/app.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/booking.js"></script>
    <script src="js/maps.js"></script>
</body>
</html>
